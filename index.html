<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calculus · 3D Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo:wght@200;300;800;900&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --bg-card: #0f1218;
    --ink: #f4f1e8;
    --ink-dim: #b8b3a4;
    --soft: #6f7783;
    --rule: #1a1f27;
    --gold: #ffd166;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: 'Exo', 'Helvetica Neue', sans-serif;
    font-weight: 300; line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  ::selection { background: var(--gold); color: var(--bg); }

  main {
    flex: 1; display: flex; flex-direction: column;
    max-width: 1280px; width: 100%; margin: 0 auto;
    padding: clamp(40px, 8vw, 96px) max(28px, 5vw);
    gap: clamp(48px, 8vw, 96px);
  }

  h1 {
    font-family: 'Exo', sans-serif;
    font-size: clamp(48px, 10vw, 140px);
    font-weight: 900; line-height: 0.95; letter-spacing: -0.04em;
    color: var(--ink);
  }
  h1 .accent { font-style: italic; font-weight: 200; color: var(--gold); }

  .methods {
    display: grid; grid-template-columns: 1fr; gap: clamp(20px, 2.5vw, 32px);
  }
  @media (min-width: 880px) {
    .methods { grid-template-columns: 1fr 1fr; }
  }
  @media (min-width: 1180px) {
    .methods { grid-template-columns: repeat(3, 1fr); }
  }

  .method-card {
    position: relative; display: flex; flex-direction: column;
    background: var(--bg-card);
    border: 1px solid var(--rule);
    border-radius: 4px;
    text-decoration: none; color: inherit;
    overflow: hidden;
    transition: border-color 220ms ease, transform 280ms cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .method-card:hover, .method-card:focus-visible {
    border-color: var(--gold);
    transform: translateY(-4px);
  }
  .method-card:focus-visible { outline: 2px solid var(--gold); outline-offset: 4px; }

  .method-card .frame {
    aspect-ratio: 16 / 10;
    overflow: hidden;
    border-bottom: 1px solid var(--rule);
    background: #07090c;
  }
  .method-card .frame img,
  .method-card .frame svg {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 700ms cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .method-card:hover .frame img,
  .method-card:hover .frame svg { transform: scale(1.04); }

  .method-card .meta {
    padding: clamp(22px, 2.6vw, 32px);
    display: flex; flex-direction: column; gap: 14px;
  }
  .method-card h2 {
    font-family: 'Exo', sans-serif;
    font-size: clamp(26px, 3vw, 38px); font-weight: 800;
    letter-spacing: -0.02em; line-height: 1;
  }
  .method-card h2 b { font-weight: 200; font-style: italic; color: var(--gold); }
  .method-card .formula {
    font-family: 'Roboto Mono', monospace;
    font-size: 13px; color: var(--ink-dim); line-height: 1.5;
  }

  .method-card .open {
    margin-top: 4px; display: flex; align-items: center; justify-content: space-between;
    padding-top: 16px; border-top: 1px solid var(--rule);
    font-family: 'Roboto Mono', monospace;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink); transition: color 220ms ease;
  }
  .method-card .open .arrow {
    width: 36px; height: 1px; background: var(--soft); position: relative;
    transition: width 220ms ease, background 220ms ease;
  }
  .method-card .open .arrow::after {
    content: ""; position: absolute; right: -1px; top: -3px;
    width: 7px; height: 7px;
    border-top: 1px solid var(--soft); border-right: 1px solid var(--soft);
    transform: rotate(45deg); transition: border-color 220ms ease;
  }
  .method-card:hover .open { color: var(--gold); }
  .method-card:hover .open .arrow { width: 56px; background: var(--gold); }
  .method-card:hover .open .arrow::after { border-color: var(--gold); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition-duration: 0ms !important;
      animation-duration: 0ms !important;
    }
  }
</style>
</head>
<body>

<main>
  <h1>Calculus, <span class="accent">visualized.</span></h1>

  <div class="methods">
    <a class="method-card" href="shell.html" aria-label="Open Shell Method explorer">
      <div class="frame">
        <img src="shell-preview.png" alt="3D rendering of nested cylindrical shells" width="1280" height="800">
      </div>
      <div class="meta">
        <h2>Shell <b>method.</b></h2>
        <div class="formula">V = ∫ 2π · x · f(x) · dx</div>
        <div class="open">
          <span>Open</span>
          <span class="arrow"></span>
        </div>
      </div>
    </a>

    <a class="method-card" href="washer.html" aria-label="Open Washer Method explorer">
      <div class="frame">
        <img src="washer-preview.png" alt="3D rendering of stacked annular washers" width="1280" height="800">
      </div>
      <div class="meta">
        <h2>Washer <b>method.</b></h2>
        <div class="formula">V = π ∫ (f(x)² − g(x)²) · dx</div>
        <div class="open">
          <span>Open</span>
          <span class="arrow"></span>
        </div>
      </div>
    </a>

    <a class="method-card" href="series.html" aria-label="Open Taylor Series explorer">
      <div class="frame">
        <img src="series-preview.png" alt="Polynomial approximations converging on a sine curve" width="1280" height="800">
      </div>
      <div class="meta">
        <h2>Taylor <b>series.</b></h2>
        <div class="formula">f(x) ≈ Σ fⁿ(a)/n! · (x−a)ⁿ</div>
        <div class="open">
          <span>Open</span>
          <span class="arrow"></span>
        </div>
      </div>
    </a>

    <a class="method-card" href="polar.html" aria-label="Open Polar Area explorer">
      <div class="frame polar-frame" aria-hidden="true">
        <svg viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="petalGrad" cx="50%" cy="60%" r="55%">
              <stop offset="0%" stop-color="#ffd166" stop-opacity="0.30"/>
              <stop offset="100%" stop-color="#ffd166" stop-opacity="0.02"/>
            </radialGradient>
          </defs>
          <rect width="1280" height="800" fill="#07090c"/>
          <!-- subtle grid -->
          <g stroke="#1a1d22" stroke-width="1">
            <line x1="0" y1="200" x2="1280" y2="200"/>
            <line x1="0" y1="400" x2="1280" y2="400"/>
            <line x1="0" y1="600" x2="1280" y2="600"/>
            <line x1="320" y1="0" x2="320" y2="800"/>
            <line x1="640" y1="0" x2="640" y2="800"/>
            <line x1="960" y1="0" x2="960" y2="800"/>
          </g>
          <!-- axes -->
          <line x1="0" y1="640" x2="1280" y2="640" stroke="#3a414a" stroke-width="1.5"/>
          <line x1="640" y1="0" x2="640" y2="800" stroke="#3a414a" stroke-width="1.5"/>
          <!-- petal (rose-like) — r = 2 sin²θ rendered as a teardrop path -->
          <path d="M 640 640
                   C 460 620, 380 480, 440 320
                   C 500 160, 780 160, 840 320
                   C 900 480, 820 620, 640 640 Z"
                fill="url(#petalGrad)" stroke="#ffd166" stroke-width="3"/>
          <!-- inner circle r = 1/2 -->
          <path d="M 480 640 A 160 160 0 0 1 800 640"
                fill="rgba(106, 169, 255, 0.18)" stroke="#6aa9ff" stroke-width="2.5"/>
          <!-- pink sweep region (between the two) -->
          <path d="M 800 640
                   C 880 580, 880 460, 820 360
                   C 760 280, 700 280, 700 280
                   L 760 640 Z"
                fill="rgba(255, 126, 182, 0.32)" stroke="#ff7eb6" stroke-width="2"/>
          <!-- dashed θ ray -->
          <line x1="640" y1="640" x2="900" y2="380" stroke="#ffd166" stroke-width="1.5" stroke-dasharray="6,5" opacity="0.7"/>
          <!-- intersection dot -->
          <circle cx="800" cy="640" r="9" fill="#ffd166"/>
          <circle cx="480" cy="640" r="9" fill="#ffd166"/>
        </svg>
      </div>
      <div class="meta">
        <h2>Polar <b>area.</b></h2>
        <div class="formula">A = ½ ∫ (r₁² − r₂²) · dθ</div>
        <div class="open">
          <span>Open</span>
          <span class="arrow"></span>
        </div>
      </div>
    </a>

    <a class="method-card" href="contour.html" aria-label="Open Contour Plots explorer">
      <div class="frame" aria-hidden="true">
        <svg viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="surfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#ffd166" stop-opacity="0.55"/>
              <stop offset="50%" stop-color="#6750d8" stop-opacity="0.45"/>
              <stop offset="100%" stop-color="#10204a" stop-opacity="0.55"/>
            </linearGradient>
          </defs>
          <rect width="1280" height="800" fill="#07090c"/>
          <!-- left: faux surface (3 ellipses stacked) -->
          <g transform="translate(320, 400)">
            <ellipse cx="0" cy="80"  rx="240" ry="60"  fill="url(#surfGrad)" stroke="#6750d8" stroke-width="1.5" opacity="0.85"/>
            <ellipse cx="0" cy="20"  rx="180" ry="48"  fill="url(#surfGrad)" stroke="#a187e6" stroke-width="1.5" opacity="0.85"/>
            <ellipse cx="0" cy="-40" rx="120" ry="34"  fill="url(#surfGrad)" stroke="#d5cdff" stroke-width="1.5" opacity="0.9"/>
            <ellipse cx="0" cy="-90" rx="60"  ry="18"  fill="url(#surfGrad)" stroke="#ffd166" stroke-width="2"   opacity="0.95"/>
            <!-- cutting plane sliver -->
            <ellipse cx="0" cy="20" rx="180" ry="48" fill="rgba(106,169,255,0.18)" stroke="#6aa9ff" stroke-width="2"/>
          </g>
          <!-- right: concentric contour map -->
          <g transform="translate(950, 400)" fill="none" stroke-width="2.5">
            <line x1="-220" y1="0" x2="220" y2="0" stroke="#3a414a" stroke-width="1.5"/>
            <line x1="0" y1="-220" x2="0" y2="220" stroke="#3a414a" stroke-width="1.5"/>
            <circle cx="0" cy="0" r="200" stroke="#6aa9ff" opacity="0.32"/>
            <circle cx="0" cy="0" r="155" stroke="#6aa9ff" opacity="0.32"/>
            <circle cx="0" cy="0" r="110" stroke="#ffd166"/>
            <circle cx="0" cy="0" r="65"  stroke="#6aa9ff" opacity="0.32"/>
            <circle cx="0" cy="0" r="22"  stroke="#6aa9ff" opacity="0.32"/>
          </g>
        </svg>
      </div>
      <div class="meta">
        <h2>Contour <b>plots.</b></h2>
        <div class="formula">f(x, y) = c → level curve</div>
        <div class="open">
          <span>Open</span>
          <span class="arrow"></span>
        </div>
      </div>
    </a>
  </div>
</main>

</body>
</html>
