<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cross Product · 3D Explorer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  :root {
    --bg: #0e1116;
    --ink: #e8e6df;
    --soft: #7a8794;
    --gold: #ffd166;
    --blue: #6aa9ff;
    --rose: #ff7eb6;
    --pill: #15181d;
    --pill-border: #23272d;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--ink);
    font-family: Georgia, "Source Serif Pro", serif;
    overflow: hidden;
  }
  #app { display: grid; grid-template-rows: auto auto 1fr auto; height: 100%; }
  /* Pin children explicitly — when #customForm is display:none, auto-placement
     would shift the 1fr track onto footer, squashing scene-wrap to 1px. */
  #app > header      { grid-row: 1; }
  #app > #customForm { grid-row: 2; }
  #app > #scene-wrap { grid-row: 3; min-height: 0; }
  #app > footer      { grid-row: 4; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; border-bottom: 1px solid var(--pill-border);
    flex-wrap: wrap; gap: 10px;
  }
  header h1 { margin: 0; font-size: 17px; font-weight: normal; color: #ddd; letter-spacing: 0.3px; }
  header h1 b { color: var(--gold); }
  .home-link {
    color: var(--soft); text-decoration: none; font-size: 13px;
    border: 1px solid var(--pill-border); border-radius: 14px;
    padding: 5px 12px; transition: all 0.15s; white-space: nowrap;
  }
  .home-link:hover { color: var(--gold); border-color: var(--gold); }
  .header-left { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .presets { display: flex; gap: 8px; flex-wrap: wrap; }
  .presets button {
    background: var(--pill); color: var(--soft);
    border: 1px solid var(--pill-border); padding: 7px 14px;
    border-radius: 18px; font-family: inherit; font-size: 13px;
    cursor: pointer; transition: all 0.15s;
  }
  .presets button:hover { color: #fff; border-color: var(--gold); }
  .presets button.active { color: var(--bg); background: var(--gold); border-color: var(--gold); font-weight: bold; }

  /* #customForm sits at grid-row 2 and is normally hidden */
  #customForm { display: none; }

  #scene-wrap {
    position: relative; min-height: 0; overflow: hidden;
  }
  #scene-wrap canvas {
    display: block; width: 100% !important; height: 100% !important;
  }

  /* Overlay — top-right of canvas */
  .overlay {
    position: absolute; top: 14px; right: 16px;
    background: rgba(14, 17, 22, 0.82);
    border: 1px solid var(--pill-border);
    border-radius: 10px;
    padding: 14px 18px;
    pointer-events: none;
    backdrop-filter: blur(6px);
    max-width: 340px;
    z-index: 10;
  }
  .overlay h2 { margin: 0 0 6px; font-size: 16px; font-weight: normal; color: var(--ink); }
  .overlay h2 b { color: var(--gold); }
  .overlay .formula-block { margin-bottom: 8px; }
  .overlay .formula-block .katex-display { margin: 0; }
  .overlay .readouts {
    font-family: "Courier New", monospace; font-size: 12px;
    line-height: 1.65; border-top: 1px solid var(--pill-border);
    margin-top: 8px; padding-top: 8px;
  }
  .overlay .readouts .row { display: flex; justify-content: space-between; gap: 10px; }
  .overlay .readouts .lbl { color: var(--soft); }
  .overlay .readouts .val { color: var(--gold); }
  .overlay .readouts .val.rose { color: var(--rose); }
  .overlay .caption {
    margin-top: 8px; font-size: 11.5px; color: var(--soft);
    font-style: italic; line-height: 1.45; border-top: 1px solid var(--pill-border);
    padding-top: 8px;
  }
  .overlay .legend {
    margin-top: 8px; font-size: 11px; color: var(--soft); line-height: 1.55;
    border-top: 1px solid var(--pill-border); padding-top: 8px;
  }
  .overlay .legend .swatch {
    display: inline-block; width: 10px; height: 10px; border-radius: 2px;
    vertical-align: middle; margin-right: 6px;
  }

  /* Right-hand rule SVG icon */
  .rhr-icon {
    position: absolute; bottom: 14px; left: 16px;
    background: rgba(14, 17, 22, 0.75);
    border: 1px solid var(--pill-border);
    border-radius: 8px; padding: 8px;
    pointer-events: none; z-index: 10;
  }
  .rhr-icon svg { display: block; }

  footer {
    padding: 10px 24px; display: flex; flex-wrap: wrap;
    gap: 14px; align-items: center;
    border-top: 1px solid var(--pill-border);
  }
  .slider-group { display: flex; flex-direction: column; gap: 2px; min-width: 120px; flex: 1 1 100px; }
  .slider-group label { font-size: 11px; color: var(--soft); }
  .slider-group label b { color: var(--ink); font-weight: normal; font-family: "Courier New", monospace; }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; background: #23272d;
    border-radius: 2px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--gold); cursor: pointer; border: 2px solid var(--bg);
  }
  input[type=range]::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--gold); cursor: pointer; border: 2px solid var(--bg);
  }
  button.action {
    background: var(--gold); color: var(--bg); border: none;
    padding: 8px 18px; border-radius: 18px;
    font-family: inherit; font-size: 13px; font-weight: bold;
    cursor: pointer; transition: transform 0.1s, background 0.15s;
    white-space: nowrap;
  }
  button.action:hover { background: #ffe199; transform: translateY(-1px); }
  button.action.ghost {
    background: transparent; color: var(--soft);
    border: 1px solid var(--pill-border);
  }
  button.action.ghost:hover { color: var(--ink); border-color: var(--gold); }
  .footer-btn-group { display: flex; gap: 8px; align-items: center; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-left">
      <a href="index.html" class="home-link">← overview</a>
      <h1><b>Cross Product</b> · 3D explorer</h1>
    </div>
    <div class="presets">
      <button data-preset="generic" class="active">generic</button>
      <button data-preset="ixj">i × j = k</button>
      <button data-preset="jxi">j × i = −k</button>
      <button data-preset="parallel">parallel → zero</button>
    </div>
  </header>

  <!-- grid-row 2: empty placeholder keeps the row in the grid -->
  <div id="customForm"></div>

  <div id="scene-wrap">
    <canvas id="mainCanvas"></canvas>

    <!-- Overlay — top-right -->
    <div class="overlay">
      <h2><b>a</b> × <b>b</b></h2>
      <div class="formula-block" id="ovFormula"></div>
      <div class="readouts">
        <div class="row"><span class="lbl">a × b =</span><span class="val rose" id="ovResult">⟨0, 0, 0⟩</span></div>
        <div class="row"><span class="lbl">|a × b| =</span><span class="val rose" id="ovMag">0</span></div>
        <div class="row"><span class="lbl">|a||b|sin θ =</span><span class="val" id="ovSin">0</span></div>
        <div class="row"><span class="lbl">θ =</span><span class="val" id="ovAngle">0°</span></div>
      </div>
      <div class="caption" id="ovCaption">Drag the sliders to see the cross product update live.</div>
      <div class="legend">
        <div><span class="swatch" style="background: var(--gold);"></span>vector <b>a</b></div>
        <div><span class="swatch" style="background: var(--blue);"></span>vector <b>b</b></div>
        <div><span class="swatch" style="background: var(--rose);"></span>a × b (perpendicular to both)</div>
        <div><span class="swatch" style="background: rgba(255,126,182,0.18); border: 1px solid rgba(255,126,182,0.45);"></span>parallelogram area = |a × b|</div>
      </div>
    </div>

    <!-- Right-hand rule icon — bottom-left -->
    <div class="rhr-icon" id="rhrIcon">
      <svg width="68" height="78" viewBox="0 0 68 78" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Hand outline -->
        <g opacity="0.85">
          <!-- Palm -->
          <ellipse cx="34" cy="56" rx="15" ry="16" fill="#23272d" stroke="#7a8794" stroke-width="1.2"/>
          <!-- Fingers curling from a toward b -->
          <path d="M20 52 C14 44 16 34 22 32 C26 30 29 34 28 40" stroke="#ffd166" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          <path d="M24 46 C18 38 20 26 27 24 C31 22 34 27 33 34" stroke="#ffd166" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          <path d="M29 43 C25 34 27 22 34 20 C38 18 41 24 40 32" stroke="#ffd166" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          <!-- Thumb pointing up (direction of a×b) -->
          <path d="M44 62 C50 58 54 50 52 42 C50 36 44 34 41 38 C39 42 41 50 44 56 C46 60 44 66 40 68" stroke="#ff7eb6" stroke-width="2" fill="none" stroke-linecap="round"/>
          <circle cx="51" cy="40" r="3" fill="#ff7eb6" opacity="0.7"/>
          <!-- Arrow tip on thumb -->
          <path d="M50 38 L53 42 M50 38 L55 38" stroke="#ff7eb6" stroke-width="1.4" stroke-linecap="round"/>
        </g>
        <!-- Labels -->
        <text x="10" y="75" font-size="8.5" fill="#ffd166" font-family="Georgia, serif" font-style="italic">curl a→b</text>
        <text x="42" y="24" font-size="8.5" fill="#ff7eb6" font-family="Georgia, serif" font-style="italic">a×b ↑</text>
      </svg>
    </div>
  </div>

  <footer>
    <div class="slider-group">
      <label>aₓ = <b id="lblAx">1.50</b></label>
      <input type="range" id="slAx" min="-2.5" max="2.5" step="0.05" value="1.5">
    </div>
    <div class="slider-group">
      <label>a_y = <b id="lblAy">0.80</b></label>
      <input type="range" id="slAy" min="-2.5" max="2.5" step="0.05" value="0.8">
    </div>
    <div class="slider-group">
      <label>a_z = <b id="lblAz">0.30</b></label>
      <input type="range" id="slAz" min="-2.5" max="2.5" step="0.05" value="0.3">
    </div>
    <div class="slider-group">
      <label>bₓ = <b id="lblBx">0.50</b></label>
      <input type="range" id="slBx" min="-2.5" max="2.5" step="0.05" value="0.5">
    </div>
    <div class="slider-group">
      <label>b_y = <b id="lblBy">1.50</b></label>
      <input type="range" id="slBy" min="-2.5" max="2.5" step="0.05" value="1.5">
    </div>
    <div class="slider-group">
      <label>b_z = <b id="lblBz">1.20</b></label>
      <input type="range" id="slBz" min="-2.5" max="2.5" step="0.05" value="1.2">
    </div>
    <div class="footer-btn-group">
      <button class="action ghost" id="btnReset">↺ reset view</button>
    </div>
  </footer>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================
// MATH HELPERS
// ============================================================
function cross(a, b) {
  return [
    a[1] * b[2] - a[2] * b[1],
    a[2] * b[0] - a[0] * b[2],
    a[0] * b[1] - a[1] * b[0],
  ];
}
function len(v) { return Math.sqrt(v[0]*v[0] + v[1]*v[1] + v[2]*v[2]); }
function dot(a, b) { return a[0]*b[0] + a[1]*b[1] + a[2]*b[2]; }
function angleDeg(a, b) {
  const la = len(a), lb = len(b);
  if (la < 1e-12 || lb < 1e-12) return 0;
  return (Math.acos(Math.max(-1, Math.min(1, dot(a, b) / (la * lb)))) * 180 / Math.PI);
}

// prettyNumber: fixed for 0.001..9999, else N × 10^k with HTML superscript
function prettyNumber(v, decimals = 3) {
  if (!isFinite(v)) return '—';
  const abs = Math.abs(v);
  if (abs === 0) return '0';
  if (abs >= 0.001 && abs < 9999) return v.toFixed(decimals);
  const exp = Math.floor(Math.log10(abs));
  const mantissa = (v / Math.pow(10, exp)).toFixed(2);
  return `${mantissa} × 10<sup>${exp}</sup>`;
}

function fmtVec(v) {
  return `⟨${prettyNumber(v[0], 3)}, ${prettyNumber(v[1], 3)}, ${prettyNumber(v[2], 3)}⟩`;
}

// ============================================================
// PRESETS
// ============================================================
const PRESETS = {
  generic: {
    label: 'generic',
    a: [1.5, 0.8, 0.3],
    b: [0.5, 1.5, 1.2],
    caption: 'Two generic vectors in 3D. The rose arrow shows their cross product, perpendicular to both.',
  },
  ixj: {
    label: 'i × j = k',
    a: [1, 0, 0],
    b: [0, 1, 0],
    caption: 'i cross j gives k — pointing straight up. This is the right-hand rule in its simplest form.',
  },
  jxi: {
    label: 'j × i = −k',
    a: [0, 1, 0],
    b: [1, 0, 0],
    caption: 'Swap the order and the result flips direction. Order matters with the cross product!',
  },
  parallel: {
    label: 'parallel → zero',
    a: [1, 1, 0],
    b: [2, 2, 0],
    caption: 'Parallel vectors span no parallelogram, so the cross product is zero — there is no unique perpendicular.',
  },
};
let activePreset = 'generic';

// ============================================================
// STATE
// ============================================================
let vecA = [...PRESETS.generic.a];
let vecB = [...PRESETS.generic.b];

// ============================================================
// THREE.JS SETUP
// ============================================================
const canvas = document.getElementById('mainCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e1116);

const camera = new THREE.PerspectiveCamera(40, 1, 0.01, 100);
camera.up.set(0, 0, 1);
camera.position.set(4.5, -4.5, 3.5);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// Lighting
scene.add(new THREE.HemisphereLight(0xeaf2ff, 0x1a1f28, 0.85));
scene.add(new THREE.AmbientLight(0xffffff, 0.25));
const camLight = new THREE.DirectionalLight(0xffffff, 0.55);
camLight.position.set(0.3, 0.5, 1);
camera.add(camLight);
scene.add(camera);

// Stage group — all dynamic geometry lives here; disposed on rebuild
const stage = new THREE.Group();
scene.add(stage);

function disposeGroup(g) {
  while (g.children.length) {
    const o = g.children[g.children.length - 1];
    g.remove(o);
    o.traverse?.(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) {
        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
        else child.material.dispose();
      }
    });
  }
}

// ============================================================
// ARROW HELPER — cone tip + shaft as tube
// ============================================================
function makeArrow(from, to, hexColor, opacity = 1) {
  const f = new THREE.Vector3(...from);
  const t = new THREE.Vector3(...to);
  const dir = new THREE.Vector3().subVectors(t, f);
  const totalLen = dir.length();
  const group = new THREE.Group();
  if (totalLen < 1e-6) return group; // degenerate

  const shaftLen = Math.max(0, totalLen - 0.18);
  const coneHeight = Math.min(0.18, totalLen * 0.35);
  const coneR = coneHeight * 0.38;

  const mat = new THREE.MeshStandardMaterial({
    color: hexColor, roughness: 0.45, metalness: 0.1,
    transparent: opacity < 1, opacity,
  });

  // Shaft
  if (shaftLen > 1e-6) {
    const shaftGeom = new THREE.CylinderGeometry(0.028, 0.028, shaftLen, 12);
    const shaft = new THREE.Mesh(shaftGeom, mat);
    // default cylinder is along Y; we need to orient along dir
    const shaftMid = new THREE.Vector3().addVectors(f, dir.clone().normalize().multiplyScalar(shaftLen / 2));
    shaft.position.copy(shaftMid);
    shaft.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
    group.add(shaft);
  }

  // Cone tip
  const coneGeom = new THREE.ConeGeometry(coneR, coneHeight, 16);
  const cone = new THREE.Mesh(coneGeom, mat);
  const tipDir = dir.clone().normalize();
  const conePos = new THREE.Vector3().addVectors(t, tipDir.clone().multiplyScalar(-coneHeight / 2));
  cone.position.copy(conePos);
  cone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), tipDir);
  group.add(cone);

  return group;
}

// ============================================================
// DASHED LINE HELPER
// ============================================================
function makeDashedLine(from, to, hexColor, opacity = 0.45) {
  const pts = [new THREE.Vector3(...from), new THREE.Vector3(...to)];
  const geom = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineDashedMaterial({
    color: hexColor, dashSize: 0.08, gapSize: 0.06,
    transparent: true, opacity,
  });
  const line = new THREE.Line(geom, mat);
  line.computeLineDistances();
  return line;
}

// ============================================================
// PARALLELOGRAM FILL (translucent)
// ============================================================
function makeParallelogram(a, b) {
  // Vertices: O, a, a+b, b
  const O = [0, 0, 0];
  const aA = [...a];
  const aB = [a[0]+b[0], a[1]+b[1], a[2]+b[2]];
  const bB = [...b];

  const verts = new Float32Array([
    // Triangle 1: O, a, a+b
    ...O, ...aA, ...aB,
    // Triangle 2: O, a+b, b
    ...O, ...aB, ...bB,
  ]);
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  geom.computeVertexNormals();
  const mat = new THREE.MeshBasicMaterial({
    color: 0xff7eb6, transparent: true, opacity: 0.18,
    side: THREE.DoubleSide, depthWrite: false,
  });
  const mesh = new THREE.Mesh(geom, mat);

  // Outline edges
  const edgePts = [
    new THREE.Vector3(...O),
    new THREE.Vector3(...aA),
    new THREE.Vector3(...aB),
    new THREE.Vector3(...bB),
    new THREE.Vector3(...O),
  ];
  const edgeGeom = new THREE.BufferGeometry().setFromPoints(edgePts);
  const edgeMat = new THREE.LineBasicMaterial({ color: 0xff7eb6, transparent: true, opacity: 0.55 });
  const edge = new THREE.Line(edgeGeom, edgeMat);
  // also diagonal
  const diagPts = [new THREE.Vector3(...aA), new THREE.Vector3(...bB)];
  const diagGeom = new THREE.BufferGeometry().setFromPoints(diagPts);
  const diagLine = new THREE.Line(diagGeom,
    new THREE.LineDashedMaterial({ color: 0xff7eb6, dashSize: 0.06, gapSize: 0.05, transparent: true, opacity: 0.32 }));
  diagLine.computeLineDistances();

  const group = new THREE.Group();
  group.add(mesh, edge, diagLine);
  return group;
}

// ============================================================
// AXIS TRIAD
// ============================================================
function makeAxisTriad(size = 1.5) {
  const axes = [
    [[0,0,0],[size,0,0], 0xff4444], // X red
    [[0,0,0],[0,size,0], 0x44cc66], // Y green
    [[0,0,0],[0,0,size], 0x6aa9ff], // Z blue
  ];
  const group = new THREE.Group();
  for (const [from, to, col] of axes) {
    const pts = [new THREE.Vector3(...from), new THREE.Vector3(...to)];
    const geom = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: 0.45 });
    group.add(new THREE.Line(geom, mat));
  }
  return group;
}

// ============================================================
// MAIN REBUILD
// ============================================================
function rebuild() {
  disposeGroup(stage);

  const a = vecA;
  const b = vecB;
  const c = cross(a, b);
  const magC = len(c);
  const magA = len(a);
  const magB = len(b);
  const theta = angleDeg(a, b);
  const sinProduct = magA * magB * Math.sin(theta * Math.PI / 180);

  // Axis triad
  const axisSize = 1.8;
  stage.add(makeAxisTriad(axisSize));

  // Grid in xy-plane (faint)
  const gridMat = new THREE.LineBasicMaterial({ color: 0x1e2228 });
  const gridPts = [];
  for (let v = -2; v <= 2; v += 0.5) {
    gridPts.push(new THREE.Vector3(-2, v, 0), new THREE.Vector3(2, v, 0));
    gridPts.push(new THREE.Vector3(v, -2, 0), new THREE.Vector3(v, 2, 0));
  }
  stage.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(gridPts), gridMat));

  // Parallelogram
  stage.add(makeParallelogram(a, b));

  // Arrow a (gold) — from origin
  stage.add(makeArrow([0,0,0], a, 0xffd166));

  // Arrow b (blue) — from origin
  stage.add(makeArrow([0,0,0], b, 0x6aa9ff));

  // Cross product arrow (rose) — from origin, scale to visible if tiny
  if (magC > 1e-6) {
    stage.add(makeArrow([0,0,0], c, 0xff7eb6));
    // Dashed -a×b to illustrate right-hand rule direction choice
    stage.add(makeDashedLine([0,0,0], [-c[0],-c[1],-c[2]], 0xff7eb6, 0.28));
  } else {
    // Show a small dot at origin so it's clear the result is zero
    const dotG = new THREE.SphereGeometry(0.07, 12, 12);
    const dotM = new THREE.MeshBasicMaterial({ color: 0xff7eb6, transparent: true, opacity: 0.7 });
    stage.add(new THREE.Mesh(dotG, dotM));
  }

  // Origin dot
  const origG = new THREE.SphereGeometry(0.045, 12, 12);
  const origM = new THREE.MeshBasicMaterial({ color: 0x7a8794 });
  stage.add(new THREE.Mesh(origG, origM));

  // ---- Update overlay ----
  // KaTeX formula: determinant form
  const latex = `\\vec{a}\\times\\vec{b}=\\begin{vmatrix}\\vec{i}&\\vec{j}&\\vec{k}\\\\${fmt(a[0])}&${fmt(a[1])}&${fmt(a[2])}\\\\${fmt(b[0])}&${fmt(b[1])}&${fmt(b[2])}\\end{vmatrix}`;
  const fmtEl = document.getElementById('ovFormula');
  if (window.katex) {
    try { katex.render(latex, fmtEl, { throwOnError: false, displayMode: true }); }
    catch (_) { fmtEl.textContent = 'a × b'; }
  } else { fmtEl.textContent = 'a × b'; }

  document.getElementById('ovResult').innerHTML = fmtVec(c);
  document.getElementById('ovMag').innerHTML = prettyNumber(magC, 4);
  document.getElementById('ovSin').innerHTML = prettyNumber(sinProduct, 4);
  document.getElementById('ovAngle').textContent = theta.toFixed(1) + '°';

  // Caption
  const preset = PRESETS[activePreset];
  let caption = preset ? preset.caption : '';
  // Override caption for near-parallel case
  if (activePreset !== 'parallel' && magC < 0.05) {
    caption = 'These vectors are nearly parallel — the cross product is almost zero, and the parallelogram area shrinks to nearly nothing.';
  }
  document.getElementById('ovCaption').textContent = caption;
}

function fmt(n) {
  // compact number for KaTeX matrix cells
  if (n === 0) return '0';
  if (Number.isInteger(n)) return String(n);
  return n.toFixed(2).replace(/\.?0+$/, '');
}

// ============================================================
// SYNC SLIDERS ↔ STATE
// ============================================================
function setVectors(a, b) {
  vecA = [...a]; vecB = [...b];
  document.getElementById('slAx').value = a[0];
  document.getElementById('slAy').value = a[1];
  document.getElementById('slAz').value = a[2];
  document.getElementById('slBx').value = b[0];
  document.getElementById('slBy').value = b[1];
  document.getElementById('slBz').value = b[2];
  syncSliderLabels();
  rebuild();
}

function syncSliderLabels() {
  document.getElementById('lblAx').textContent = (+document.getElementById('slAx').value).toFixed(2);
  document.getElementById('lblAy').textContent = (+document.getElementById('slAy').value).toFixed(2);
  document.getElementById('lblAz').textContent = (+document.getElementById('slAz').value).toFixed(2);
  document.getElementById('lblBx').textContent = (+document.getElementById('slBx').value).toFixed(2);
  document.getElementById('lblBy').textContent = (+document.getElementById('slBy').value).toFixed(2);
  document.getElementById('lblBz').textContent = (+document.getElementById('slBz').value).toFixed(2);
}

function readSliders() {
  vecA = [
    +document.getElementById('slAx').value,
    +document.getElementById('slAy').value,
    +document.getElementById('slAz').value,
  ];
  vecB = [
    +document.getElementById('slBx').value,
    +document.getElementById('slBy').value,
    +document.getElementById('slBz').value,
  ];
}

['slAx','slAy','slAz','slBx','slBy','slBz'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    readSliders();
    syncSliderLabels();
    // When user manually drags, deactivate any preset highlight
    activePreset = '';
    document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
    rebuild();
  });
});

// ============================================================
// PRESETS
// ============================================================
document.querySelectorAll('.presets button').forEach(btn => {
  btn.addEventListener('click', () => {
    activePreset = btn.dataset.preset;
    document.querySelectorAll('.presets button').forEach(b => b.classList.toggle('active', b === btn));
    const p = PRESETS[activePreset];
    setVectors(p.a, p.b);
  });
});

// ============================================================
// RESET VIEW
// ============================================================
document.getElementById('btnReset').addEventListener('click', () => {
  camera.position.set(4.5, -4.5, 3.5);
  controls.target.set(0, 0, 0);
  controls.update();
});

// ============================================================
// RESIZE
// ============================================================
function resize() {
  const wrap = document.getElementById('scene-wrap');
  const w = Math.max(120, wrap.clientWidth);
  const h = Math.max(120, wrap.clientHeight);
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

// ============================================================
// RENDER LOOP
// ============================================================
function tick() {
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}

// ============================================================
// INLINE SELF-TEST
// ============================================================
(() => {
  const arrEq = (a, b, tol = 1e-9) => a.length === b.length && a.every((x, i) => Math.abs(x - b[i]) < tol);
  console.assert(arrEq(cross([1,0,0],[0,1,0]),[0,0,1]),  'FAIL: i×j=k');
  console.assert(arrEq(cross([0,1,0],[1,0,0]),[0,0,-1]), 'FAIL: j×i=-k');
  console.assert(arrEq(cross([1,2,3],[1,2,3]),[0,0,0]),  'FAIL: parallel→0');
  // |a×b| for a=[1,2,0], b=[3,1,0] should be |[0,0,1*1-2*3]| = |[0,0,-5]| = 5
  const a=[1,2,0], b=[3,1,0], c=cross(a,b);
  const mag = len(c);
  console.assert(Math.abs(mag - 5) < 1e-9, `FAIL: area 1,2,0 × 3,1,0 = ${mag} (expected 5)`);
  // orthogonality: c should be perpendicular to both a and b
  const aG=[1.5,0.8,0.3], bG=[0.5,1.5,1.2], cG=cross(aG,bG);
  console.assert(Math.abs(dot(cG,aG)) < 1e-9, 'FAIL: c not perp to a');
  console.assert(Math.abs(dot(cG,bG)) < 1e-9, 'FAIL: c not perp to b');
  console.log('[cross] all tests passed');
})();

// ============================================================
// BOOT
// ============================================================
// Initialize sliders from default preset
setVectors(PRESETS.generic.a, PRESETS.generic.b);
resize();
tick();

// Debug hooks
window.__stage = stage;
window.__camera = camera;
window.__rebuild = rebuild;
window.__state = () => ({ vecA, vecB, cross: cross(vecA, vecB) });
</script>
